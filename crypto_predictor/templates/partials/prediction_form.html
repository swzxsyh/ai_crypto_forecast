<section class="panel" style="margin-bottom:20px">
  <div style="padding:20px 20px 0;margin-bottom:2px" class="section-title">
    <div class="section-icon">AI</div>
    <div>
      <h2>{{ t("predict.title") }}</h2>
      <p>{{ t("predict.subtitle") }}</p>
    </div>
  </div>
  <form class="controls" method="post" action="/predict">
    <label>
      {{ t("field.symbol") }}
      <select name="symbol" id="symbolSelect" onchange="handlePredictSymbolChange(this)">
        <option value="">{{ t("select.symbol") }}</option>
        {% for symbol in symbols %}
          <option value="{{ symbol }}">{{ symbol }}</option>
        {% endfor %}
        <option value="custom">{{ t("select.custom") }}</option>
      </select>
    </label>
    <label id="predictSymbolCustomLabel" style="display:none">
      {{ t("field.custom_symbol") }}
      <input name="symbol_custom" id="predictSymbolCustom" type="text" placeholder="{{ t('placeholder.symbol') }}">
    </label>
    <label>
      {{ t("field.timeframe") }}
      <select name="timeframe">
        {% for timeframe in timeframes %}
          <option value="{{ timeframe }}" {% if timeframe == default_timeframe %}selected{% endif %}>
            {{ timeframe }}
          </option>
        {% endfor %}
      </select>
    </label>
    <label>
      {{ t("field.kline_limit") }}
      <input name="limit" type="number" min="1" value="{{ default_limit }}">
    </label>
    <label>
      {{ t("field.model") }}
      <select name="model_type">
        <option value="openai">openai</option>
        <option value="anthropic">anthropic</option>
      </select>
    </label>
    <label class="check">
      <input name="all_symbols" type="checkbox">
      {{ t("field.all_symbols") }}
    </label>
    <button type="submit">{{ t("actions.create_prediction") }}</button>
  </form>
  <script>
    function handlePredictSymbolChange(sel) {
      var label = document.getElementById('predictSymbolCustomLabel');
      if (label) {
        label.style.display = sel.value === 'custom' ? '' : 'none';
      }
    }
  </script>
</section>
